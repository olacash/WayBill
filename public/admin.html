<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WayBill Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-page">
  <div class="page-container">
    <header>
      <h1>Admin Dashboard</h1>
      <p>Review user requests, issue tracking codes, and monitor active shipments.</p>
      <a class="admin-link" href="index.html">User site</a>
    </header>

    <section class="card" id="adminLogin">
      <h2>Admin sign in</h2>
      <p>Enter the admin email to access pending requests and issue tracking codes.</p>
      <form id="adminLoginForm">
        <label>
          Admin email
          <input type="email" name="adminEmail" required placeholder="Enter admin email" />
        </label>
        <button type="submit">Sign in</button>
      </form>
      <div id="adminLoginMessage" class="message"></div>
      <p class="note">Admin email: <strong>olaoseibikan232@gmail.com</strong></p>
    </section>

    <section class="card" id="dashboardSection" style="display:none;">
      <h2>Pending requests</h2>
      <div id="pendingRequests"></div>
    </section>

    <section class="card" id="activeSection" style="display:none;">
      <h2>Active shipments</h2>
      <div id="activeShipments"></div>
      <button id="adminLogout" class="action-button" style="margin-top: 0;">Logout</button>
    </section>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
